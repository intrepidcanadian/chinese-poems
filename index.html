<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日一诗 · A Chinese Poem a Day</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-zh">每日一诗</span>
        <span class="brand-en">A Chinese Poem a Day</span>
      </div>
      <div class="date-strip">
        <button id="prevDay" class="nav-btn" title="Previous poem" aria-label="Previous poem">‹</button>
        <span id="dateLabel" class="date-label"></span>
        <button id="nextDay" class="nav-btn" title="Next poem" aria-label="Next poem">›</button>
      </div>
    </header>

    <main id="poemRoot" class="poem"></main>

    <div class="toolbar">
      <label class="toggle"><input type="checkbox" id="togglePinyin" checked /> Pinyin</label>
      <label class="toggle"><input type="checkbox" id="toggleTranslation" checked /> Translation</label>
      <button id="todayBtn" class="pill">Today</button>
      <button id="randomBtn" class="pill">Random</button>
      <button id="browseBtn" class="pill">Browse all</button>
    </div>

    <div class="hint">Tip: tap any Chinese character to see its individual meaning.</div>

    <div id="browseSheet" class="sheet" hidden>
      <div class="sheet-inner">
        <div class="sheet-head">
          <h2>All poems</h2>
          <button id="closeBrowse" class="pill ghost">Close</button>
        </div>
        <ul id="browseList" class="browse-list"></ul>
      </div>
    </div>

    <footer class="footer">
      Classic 唐诗 (Tang poetry) · translations &amp; character glosses for study
    </footer>
  </div>

  <div id="charPop" class="char-pop" hidden>
    <span class="cp-char"></span>
    <span class="cp-pinyin"></span>
    <span class="cp-meaning"></span>
  </div>

  <script src="poems.js"></script>
  <script src="app.js"></script>
</body>
</html>
